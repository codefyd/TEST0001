<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | برنامج السرد</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body{
      font-family:'Tajawal',sans-serif;
      background:linear-gradient(135deg,#014979,#013560);
      min-height:100vh;
    }
    .login-card{
      border:none;
      border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.12);
    }
  </style>
</head>
<body class="d-flex align-items-center">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">
        <div class="card login-card">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <div class="mb-3">
                <i class="fa-solid fa-book-quran fa-2x" style="color:#014979;"></i>
              </div>
              <h1 class="fw-bold mb-2">برنامج السرد</h1>
              <p class="text-muted mb-0">تسجيل دخول العاملين والمسمّعين</p>
            </div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control form-control-lg rounded-3" required>
              </div>

              <div class="mb-3">
                <label class="form-label">كلمة المرور</label>
                <div class="input-group input-group-lg">
                  <input type="password" id="password" class="form-control rounded-start-3" required>
                  <button type="button" class="btn btn-outline-secondary rounded-end-3" id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-lg text-white rounded-3" style="background:#014979;" id="loginBtn">
                  <i class="fa-solid fa-right-to-bracket me-1"></i>
                  دخول
                </button>
              </div>
            </form>

            <div class="text-center mt-4">
              <a href="index.html" class="text-decoration-none">العودة لواجهة الطلب</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
