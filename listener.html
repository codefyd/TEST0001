<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>واجهة التسميع | برنامج السرد</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body{font-family:'Tajawal',sans-serif;background:#f4f6f9;}
    .kpi-card{
      border:none;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,.06);
      transition:.25s ease;
    }
    .kpi-card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 40px rgba(0,0,0,.10);
    }
    .section-card{
      border:1px solid #e9ecef;
      border-radius:18px;
      background:#fff;
      transition:.2s ease;
    }
    .section-card.passed{border-color:#cdebd8;background:#f5fbf7;}
    .section-card.failed{border-color:#f3d2ce;background:#fff6f5;}
    .score-badge{
      min-width:70px;
      text-align:center;
      border-radius:999px;
      padding:8px 12px;
      font-weight:800;
    }
    .counter-btn{
      width:42px;
      height:42px;
      border-radius:12px;
    }
    .sticky-tools{
      position:sticky;
      top:72px;
      z-index:10;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
      <span class="navbar-brand fw-bold">برنامج السرد</span>
      <div class="ms-auto d-flex gap-2">
        <a href="admin-requests.html" class="btn btn-outline-secondary rounded-3 d-none" id="adminLink">الإدارة</a>
        <button class="btn btn-outline-danger rounded-3" id="logoutBtn">خروج</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card border-0 shadow-sm rounded-4 mb-4 sticky-tools">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-lg-3 col-md-6">
            <label class="form-label">المسار</label>
            <select id="trackFilter" class="form-select rounded-3"></select>
          </div>
          <div class="col-lg-3 col-md-6">
            <label class="form-label">الحلقة</label>
            <select id="halaqaFilter" class="form-select rounded-3"></select>
          </div>
          <div class="col-lg-4 col-md-8">
            <label class="form-label">الطالب</label>
            <select id="studentFilter" class="form-select rounded-3"></select>
          </div>
          <div class="col-lg-2 col-md-4 d-grid">
            <label class="form-label opacity-0">.</label>
            <button class="btn text-white rounded-3" style="background:#014979;" id="reloadBtn">
              <i class="fa-solid fa-rotate"></i>
              تحديث
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="studentPanel" class="mb-4">
      <div class="alert alert-light border rounded-4">اختر الطالب لعرض بياناته</div>
    </div>

    <div id="sectionsWrap" class="row g-3"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/guard.js"></script>
  <script src="assets/js/listener.js"></script>
</body>
</html>
