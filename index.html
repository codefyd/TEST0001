<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طلب النظام | برنامج السرد</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body style="font-family:Tajawal,sans-serif;background:#f4f6f9;">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <h1 class="fw-bold mb-2">طلب النظام</h1>
              <p class="text-muted mb-0">أرسل طلبك للحصول على نسخة من منصة السرد لجهتك</p>
            </div>

            <form id="requestForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">اسم الجهة / المجمع</label>
                  <input type="text" class="form-control form-control-lg rounded-3" id="organization_name" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">اسم المسؤول</label>
                  <input type="text" class="form-control form-control-lg rounded-3" id="requester_name" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label">البريد الإلكتروني</label>
                  <input type="email" class="form-control form-control-lg rounded-3" id="email">
                </div>
                <div class="col-md-6">
                  <label class="form-label">رقم الجوال</label>
                  <input type="text" class="form-control form-control-lg rounded-3" id="phone">
                </div>
                <div class="col-12">
                  <label class="form-label">ملاحظات</label>
                  <textarea class="form-control rounded-3" rows="4" id="notes"></textarea>
                </div>
              </div>

              <div class="d-grid mt-4">
                <button type="submit" class="btn btn-lg rounded-3 text-white" style="background:#014979;" id="submitRequestBtn">
                  <i class="fa-solid fa-paper-plane me-1"></i>
                  إرسال الطلب
                </button>
              </div>
            </form>

            <div id="requestResult" class="mt-4"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/helpers.js"></script>
  <script src="assets/js/request-system.js"></script>
</body>
</html>
